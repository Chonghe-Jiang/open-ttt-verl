name: ttt-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ttt-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.13"

      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install --no-deps -e .

      - name: Compile TTT modules
        run: |
          python -m compileall -q verl_ttt_discover scripts/ttt_discover

      - name: Check TTT license headers
        run: |
          python tests/special_sanity/check_license.py \
            --directories verl_ttt_discover tests/ttt_discover scripts/ttt_discover

      - name: Run TTT tests
        run: |
          pytest -q tests/ttt_discover

      - name: Prepare official B200 config
        run: |
          python -m verl_ttt_discover.main_erdos \
            --config verl_ttt_discover/config/erdos_4gpu_b200_gptoss20b_bf16_official.yaml \
            --prepare-only \
            run.output_dir=/tmp/open_ttt_verl_ci_prepare \
            run.num_steps=1 \
            run.save_freq=-1 \
            ttt.group_size=8 \
            run.max_response_length=4096 \
            ttt.phase1_max_tokens=4096 \
            actor_rollout_ref.rollout.max_model_len=8192 \
            actor_rollout_ref.rollout.max_num_seqs=64
